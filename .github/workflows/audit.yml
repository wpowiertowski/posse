name: Dependency Audit

on:
  pull_request:
    paths:
      - poetry.lock
      - pyproject.toml
      - Dockerfile
      - .trivyignore
      - osv-scanner.toml
  push:
    branches: [ main ]
    paths:
      - poetry.lock
      - pyproject.toml
      - Dockerfile
      - .trivyignore
      - osv-scanner.toml
  # Weekly scan catches advisories published against versions we already
  # run, independent of any dependency change landing.
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Scan poetry.lock against OSV
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=./poetry.lock

  # OSV only covers the Python lockfile. Most of this project's recurring CVEs
  # live in the base image and apk packages (zlib, BusyBox, wget), so scan the
  # built image for OS- and library-level advisories as well.
  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build production image
        run: docker build -t posse:audit .

      - name: Scan image for OS and library vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: posse:audit
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          # Only fail on advisories that have a fix available; unfixed alpine
          # CVEs would otherwise make the gate permanently red and unactionable.
          ignore-unfixed: true
          exit-code: '1'
